name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: werewolf
          POSTGRES_PASSWORD: werewolf
          POSTGRES_DB: werewolf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U werewolf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Lint with ruff
        working-directory: backend
        run: poetry run ruff check .

      - name: Type check with mypy
        working-directory: backend
        run: poetry run mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://werewolf:werewolf@localhost:5432/werewolf_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: poetry run pytest --cov=app --cov-report=xml tests/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: frontend
        run: npm test
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build
